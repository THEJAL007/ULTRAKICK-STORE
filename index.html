<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA KICK | Football Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">ULTRA<span>KICK</span></div>
            <ul>
                <li><a href="#jerseys">Jerseys</a></li>
                <li><a href="#boots">Boots</a></li>
                <li><a href="#balls">Balls</a></li>
            </ul>
            <div class="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count">0</span>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>GEAR UP FOR THE GAME</h1>
            <p>Premium Football Kits, Boots, and Accessories</p>
            <button class="shop-now">SHOP NOW</button>
        </section>

        <section id="jerseys" class="product-section">
            <h2><i class="fas fa-tshirt"></i> FOOTBALL JERSEYS</h2>
            <div id="jerseys-grid" class="product-grid">
                <p class="loading">Connecting to locker room...</p>
            </div>
        </section>

        <section id="boots" class="product-section">
            <h2><i class="fas fa-shoe-prints"></i> FOOTBALL BOOTS</h2>
            <div id="boots-grid" class="product-grid">
                <p class="loading">Loading speed...</p>
            </div>
        </section>

        <section id="balls" class="product-section">
            <h2><i class="fas fa-circle"></i> MATCH BALLS</h2>
            <div id="balls-grid" class="product-grid">
                <p class="loading">Inflating match balls...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ULTRA KICK STORE | Built for Champions</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
